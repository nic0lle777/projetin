name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flet
      - run: flet build apk
      - uses: actions/upload-artifact@v4
        with:
          name: MeuApp-APK
          path: build/apk/**/*.apk
